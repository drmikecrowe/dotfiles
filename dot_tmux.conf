unbind r
bind r source-file ~/.tmux.conf
bind R refresh-client

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended keys disabled — breaks mouse drag/selection (CSI-u conflicts with mouse event parsing)
# Extended keys enabled — mouse drag fixed via explicit begin-selection binding
set -g extended-keys on
set -g extended-keys-format csi-u

set -g prefix C-b

set -g mouse on

set-window-option -g mode-keys vi

# Mouse drag: enter copy-mode with character-level selection
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } "copy-mode -M ; send-keys -X begin-selection"

# Copy to Wayland clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "wl-copy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# My settings 
set-option -g default-command $SHELL
set-option -g default-shell $SHELL

# clear screen
bind w send-keys -R \; clear-history

# Horizontal splits with C-s
unbind C-s
bind-key C-s choose-tree -Zs
bind-key - split-window

# Vertical split with v and C-v
unbind C-v
bind-key C-v split-window -h

# Toggle Sessions (C-t and n)
bind-key C-t run-shell 'current=$(tmux display-message -p "#S"); hash=$(echo "$current" | sed "s/.*_//"); if echo "$current" | grep -q "^aoe_term_"; then target=$(tmux list-sessions -F "##{session_name}" | grep -v "^aoe_term_" | grep "_${hash}$" | head -1); else target=$(tmux list-sessions -F "##{session_name}" | grep "^aoe_term_.*_${hash}$" | head -1); fi; if [ -n "$target" ]; then tmux switch-client -t "$target"; else tmux display-message "No paired session for hash ${hash}"; fi'
bind-key n run-shell 'current=$(tmux display-message -p "#S"); hash=$(echo "$current" | sed "s/.*_//"); if echo "$current" | grep -q "^aoe_term_"; then target=$(tmux list-sessions -F "##{session_name}" | grep -v "^aoe_term_" | grep "_${hash}$" | head -1); else target=$(tmux list-sessions -F "##{session_name}" | grep "^aoe_term_.*_${hash}$" | head -1); fi; if [ -n "$target" ]; then tmux switch-client -t "$target"; else tmux display-message "No paired session for hash ${hash}"; fi'

# Toggle mouse on
bind m \
    set -g mode-mouse on \;\
    set -g mouse-resize-pane on \;\
    set -g mouse-select-pane on \;\
    set -g mouse-select-window on \;\
    display 'Mouse: ON'

# Toggle mouse off
bind M \
    set -g mode-mouse off \;\
    set -g mouse-resize-pane off \;\
    set -g mouse-select-pane off \;\
    set -g mouse-select-window off \;\
    display 'Mouse: OFF'

# end of My Options

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override plugin bindings (must be after tpm run)
bind-key s choose-tree -Zs
