# Yazi Configuration
# https://yazi-rs.github.io/docs/configuration/yazi

[plugin]
prepend_previewers = [
  # Directory preview with eza (must be first for directories)
  { mime = "inode/directory", run = "eza-preview" },

  # Markdown preview with glow
  # $w = width, $h = height, $1 = file path (provided by piper)
  { name = "*.md", run = 'piper -- glow -s dark -w $w "$1"' },

  # Archive preview with ouch
  { mime = "application/*zip", run = "ouch" },
  { mime = "application/x-tar", run = "ouch" },
  { mime = "application/x-bzip2", run = "ouch" },
  { mime = "application/x-7z-compressed", run = "ouch" },
  { mime = "application/x-rar", run = "ouch" },
  { mime = "application/x-xz", run = "ouch" },

  # Rich text preview (json, csv, etc. - NOT markdown since glow handles that)
  { name = "*.csv", run = "rich-preview" },
  { name = "*.rst", run = "rich-preview" },
  { name = "*.ipynb", run = "rich-preview" },
  { name = "*.json", run = "rich-preview" },
  { mime = "application/json", run = "rich-preview" },
]

# Fallback previewers - these run if nothing above matched
append_previewers = [
  # Hex previewer for binary/unknown files
  { name = "*", run = "hexyl" },
]
